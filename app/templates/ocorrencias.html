<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocorrências - Acadêmico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #e2e8f0; }
        .glass-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; }
        .border-danger-custom { border-left: 4px solid #ef4444 !important; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="glass-card shadow">
            <h2 class="fw-bold mb-4 text-danger">Registros de Ocorrências</h2>
            {% for o in ocorrencias %}
            <div class="card bg-dark text-white mb-3 border-danger-custom shadow-sm p-3">
                <div class="d-flex justify-content-between">
                    <h5 class="text-info">{{ o.pessoa.nome }}</h5>
                    <span class="text-secondary small">{{ o.data|date:"d/m/Y" }}</span>
                </div>
                <p class="mb-1"><strong>Curso/Disciplina:</strong> {{ o.curso.nome }} - {{ o.disciplina.nome }}</p>
                <hr class="my-2 opacity-25">
                <p class="text-secondary italic">"{{ o.descricao }}"</p>
            </div>
            {% empty %}
            <p class="text-center text-secondary">Nenhuma ocorrência registrada.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
