<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliações - Acadêmico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #e2e8f0; }
        .glass-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="glass-card shadow">
            <h2 class="fw-bold mb-4 text-warning">Avaliações Agendadas</h2>
            <div class="row g-3">
                {% for a in avaliacoes %}
                <div class="col-md-6">
                    <div class="p-3 border border-secondary rounded bg-dark">
                        <h5 class="text-warning">{{ a.descricao }}</h5>
                        <p class="small mb-1"><strong>Disciplina:</strong> {{ a.disciplina.nome }}</p>
                        <span class="badge bg-secondary">{{ a.tipo.nome }}</span>
                    </div>
                </div>
                {% endfor %}
            </div>
            <a href="/" class="btn btn-outline-secondary mt-4">Voltar</a>
        </div>
    </div>
</body>
</html>
