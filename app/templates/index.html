<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Portal Acadêmico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

            font-family: 'Segoe UI', sans-serif;

            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border-radius: 20px;
            padding: 60px;
            margin-top: 50px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-custom { background: #38bdf8; color: #0f172a; font-weight: bold; border-radius: 10px; }
        .btn-custom:hover { background: #7dd3fc; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">ACADÊMICO</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/">Home</a>
                    <a class="nav-link" href="/pessoas/">Pessoas</a>
                    <a class="nav-link" href="/cursos/">Cursos</a>
                    <a class="nav-link" href="/disciplinas/">Disciplinas</a>
                    <a class="nav-link" href="/matriculas/">Matrículas</a>

        </div>

    <div class="container">

            <p class="lead mb-5 text-secondary">Plataforma integrada para controle de registros acadêmicos e institucionais.</p>
            <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                <a href="/pessoas/" class="btn btn-custom btn-lg px-4 gap-3">Consultar Pessoas</a>
                <a href="/admin/" class="btn btn-outline-light btn-lg px-4">Acesso Administrativo</a>

</html>
