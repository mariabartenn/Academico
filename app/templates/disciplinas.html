<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disciplinas - Acadêmico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #e2e8f0; }
        .glass-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; }
        .badge-disciplina { background: #818cf8; color: white; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="glass-card shadow">
            <h2 class="fw-bold mb-4"><span style="color: #818cf8;">|</span> Matriz Curricular (Disciplinas)</h2>
            <div class="table-responsive">
                <table class="table table-dark table-hover">
                    <thead>
                        <tr>
                            <th>DISCIPLINA</th>
                            <th>ÁREA</th>
                            <th>CURSO VINCULADO</th>
                            <th>PERÍODO</th>
                            <th>CARGA HORÁRIA</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for r in relacoes %}
                        <tr>
                            <td class="fw-bold">{{ r.disciplina.nome }}</td>
                            <td>{{ r.disciplina.area_saber.nome }}</td>
                            <td>{{ r.curso.nome }}</td>
                            <td><span class="badge border text-info">{{ r.periodo }}</span></td>
                            <td>{{ r.carga_horaria }}h</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
