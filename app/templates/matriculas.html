<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrículas - Acadêmico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #e2e8f0; }
        .glass-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="glass-card shadow">
            <h2 class="fw-bold mb-4"><span style="color: #38bdf8;">|</span> Registro de Matrículas</h2>
            <div class="table-responsive">
                <table class="table table-dark table-hover">
                    <thead>
                        <tr>
                            <th>ALUNO</th>
                            <th>CURSO</th>
                            <th>INSTITUIÇÃO</th>
                            <th>DATA INÍCIO</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for m in matriculas %}
                        <tr>
                            <td class="fw-bold text-info">{{ m.pessoa.nome }}</td>
                            <td>{{ m.curso.nome }}</td>
                            <td>{{ m.instituicao.nome }}</td>
                            <td>{{ m.data_inicio|date:"d/m/Y" }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            <a href="/" class="btn btn-outline-secondary mt-3">Voltar</a>
        </div>
    </div>
</body>
</html>
